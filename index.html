<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DREAMGRIEF — Перенаправление</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f0f13;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            background: #181820;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 400px;
            width: 100%;
            border: 1px solid #2a2a38;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #ff4757;
            letter-spacing: 1px;
        }

        p {
            color: #a4a4b2;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .captcha-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .math-question {
            font-size: 16px;
            color: #ffffff;
            font-weight: bold;
        }

        input[type="number"] {
            background: #22222e;
            border: 1px solid #2f2f42;
            padding: 12px;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            text-align: center;
            outline: none;
            width: 100%;
        }

        input[type="number"]:focus {
            border-color: #ff4757;
        }

        .error-msg {
            color: #ff4757;
            font-size: 12px;
            display: none;
            margin-top: -5px;
        }

        .btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #ff6b81;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="verify-section">
            <h1>DREAMGRIEF</h1>
            <p>Пройдите проверку для перехода на сайт:</p>
            
            <div class="captcha-box">
                <div class="math-question" id="mathQuestion">Загрузка...</div>
                <input type="number" id="userAnswer" placeholder="Введите ответ" autofocus>
                <div class="error-msg" id="errorMsg">Неверно, попробуйте еще раз!</div>
                <button class="btn" onclick="checkAnswer()">Перейти</button>
            </div>
        </div>
    </div>

    <script>
        let num1 = Math.floor(Math.random() * 10) + 1;
        let num2 = Math.floor(Math.random() * 10) + 1;
        let correctAnswer = num1 + num2;

        document.getElementById('mathQuestion').innerText = `Сколько будет: ${num1} + ${num2}?`;

        // Разрешаем нажимать Enter для подтверждения
        document.getElementById('userAnswer').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        function checkAnswer() {
            let userVal = parseInt(document.getElementById('userAnswer').value);
            let errorBlock = document.getElementById('errorMsg');

            if (userVal === correctAnswer) {
                // Перенаправляем игрока на основной сайт
                window.location.href = 'https://hm514990.webhm.cloud';
            } else {
                errorBlock.style.display = 'block';
                document.getElementById('userAnswer').value = '';
            }
        }
    </script>

</body>
</html>
